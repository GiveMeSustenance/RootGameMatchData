<!doctype html>
<html>
  <head>
    <title>Root Game Match Data</title>
    <link rel="stylesheet" type="text/css" href="layout.css" />
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
  </head>

  <body>
    <div class="header">
      <div class="header__background"></div>
      <div class="header__content">
        <h1 class="header__title">ROOT</h1>
        <p class="header__subtitle">Match Data</p>
      </div>
    </div>

    <div class="match-detail-container--fixed">
      <div class="match-detail" id="match-detail">
        <div class="match-detail__background"></div>
        <div class="match-detail__header">
          <h2 class="match-detail__title">Match Details</h2>
        </div>
        <div class="match-detail__content">
          <div
            class="match-detail__content__block"
            id="match-detail__content__block__turns"
          >
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-label"
            >
              Turns
            </div>
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-value"
              id="match-detail__content__block__turns__value"
            >
              23
            </div>
          </div>

          <div
            class="match-detail__content__block"
            id="match-detail__content__block__duration"
          >
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-label"
            >
              Duration
            </div>
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-value"
              id="match-detail__content__block__duration__value"
            >
              2h 30m
            </div>
          </div>

          <div
            class="match-detail__content__block"
            id="match-detail__content__block__isAdvancedSetup"
          >
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-label"
            >
              Advanced Setup
            </div>
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-value"
              id="match-detail__content__block__isAdvancedSetup__value"
            >
              Yes
            </div>
          </div>

          <div
            class="match-detail__content__block"
            id="match-detail__content__block__isDraft"
          >
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-label"
            >
              Draft
            </div>
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-value"
              id="match-detail__content__block__isDraft__value"
            >
              Yes
            </div>
          </div>

          <div
            class="match-detail__content__block"
            id="match-detail__content__block__id"
          >
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-label"
            >
              Date
            </div>
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-value"
              id="match-detail__content__block__id-1__value"
            >
              2026-04-18
            </div>
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-value"
              id="match-detail__content__block__id-2__value"
            >
              #1
            </div>
          </div>

          <div
            class="match-detail__content__block"
            id="match-detail__content__block__deck"
          >
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-image"
              id="match-detail__content__block__deck-image"
            >
              <img
                src="assets/decks/Exiles & Partisans.webp"
                alt="E&P Deck"
                height="168px"
              />
            </div>
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-value"
              id="match-detail__content__block__deck-value"
            >
              Exiles & Partisans
            </div>
          </div>

          <div
            class="match-detail__content__block"
            id="match-detail__content__block__map"
          >
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-image"
              id="match-detail__content__block__map-image"
            >
              <img
                src="assets/maps/Mountain.png"
                alt="Mountain Map"
                height="216px"
              />
            </div>
            <div
              class="match-detail__content__block__wrapper match-detail__content__block__wrapper-value"
              id="match-detail__content__block__map-value"
            >
              Mountain Map (Random Suits)
            </div>
          </div>

          <div
            class="match-detail__content__block match-detail__content__block--seat"
            id="match-detail__content__block__seat1"
          ></div>
        </div>
      </div>
    </div>

    <div class="content" id="content">
      <div class="content__background"></div>
      <div class="data">
        <div class="data__id data_cell">2026-04-18 #1</div>
        <div class="data__factions data_cell">
          <img
            src="assets/faction-icons/Marquise de Cat.webp"
            alt="Marquise de Cat"
            class="data__faction-icon"
          />
          <img
            src="assets/faction-icons/Eyrie Dynasties.webp"
            alt="Eyrie Dynasties"
            class="data__faction-icon"
          />
          <img
            src="assets/faction-icons/Woodland Alliance.webp"
            alt="Woodland Alliance"
            class="data__faction-icon"
          />
          <img
            src="assets/faction-icons/Vagabond.webp"
            alt="Vagabond - Thief"
            class="data__faction-icon"
          />
        </div>
        <div class="data__map data_cell">Mountain</div>
        <div class="data__deck data_cell">
          <img
            src="assets/decks/Exiles & Partisans.webp"
            alt="E&P Deck"
            class="data__deck-icon"
          />
        </div>
        <div class="data__duration data_cell">2h 30m</div>
        <div class="data__victory data_cell">
          <div class="data__victory__1st data__victory_cell">1st:</div>
          <div class="data__victory__factions data__victory_cell">
            <img
              src="assets/faction-icons/Marquise de Cat.webp"
              alt="Marquise de Cat"
              class="data__faction-icon"
            />
            <img
              src="assets/faction-icons/Vagabond.webp"
              alt="Vagabond - Thief"
              class="data__faction-icon"
            />
          </div>
          <div class="data__victory__detail data__victory_cell">Coalition</div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
